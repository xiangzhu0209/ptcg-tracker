<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PTCG Pro 3.1 專業財務版</title>
    
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;800&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root { --pika-yellow: rgb(243, 207, 63); --pika-dark: rgb(38, 28, 20); --pika-brown: rgb(160, 78, 6); --up: #eb4034; --down: #1fa139; }
        body { font-family: 'Nunito', 'M PLUS Rounded 1c', sans-serif; background: #f8f8f8; margin: 0; padding-bottom: 100px; color: var(--pika-dark); }
        
        /* 登入畫面 */
        #loginScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--pika-yellow); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .pin-dots { display: flex; gap: 15px; margin-bottom: 30px; }
        .dot { width: 18px; height: 18px; border-radius: 50%; border: 3px solid var(--pika-dark); background: transparent; transition: 0.2s; }
        .dot.filled { background: var(--pika-dark); }
        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .numpad button { width: 75px; height: 75px; border-radius: 50%; background: white; color: var(--pika-yellow); font-size: 32px; font-weight: 900; border: 3px solid var(--pika-dark); box-shadow: 0 5px 0 var(--pika-dark); -webkit-text-stroke: 1px var(--pika-dark); cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* 財務儀表板 */
        .dashboard { background: var(--pika-dark); color: white; padding: 20px; border-radius: 0 0 20px 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .stat-card { background: rgba(255,255,255,0.1); padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); }
        .stat-label { font-size: 11px; color: #aaa; margin-bottom: 5px; font-weight: bold; }
        .stat-value { font-size: 18px; font-weight: 900; }
        .stat-value.up { color: var(--up); }
        .stat-value.down { color: #50ff7b; }

        /* Header */
        .header { background: var(--pika-yellow); padding: 15px; border-bottom: 4px solid var(--pika-dark); position: sticky; top: 0; z-index: 100; border-radius: 0 0 15px 15px; }
        .search-bar { background: white; border-radius: 20px; padding: 10px 15px; border: 2px solid var(--pika-dark); display: flex; align-items: center; }
        .search-bar input { border: none; outline: none; width: 100%; font-size: 16px; font-weight: bold; font-family: inherit; }
        .filter-tabs { display: flex; gap: 8px; margin-top: 12px; }
        .filter-tab { flex: 1; padding: 8px; border-radius: 20px; border: 2px solid var(--pika-dark); background: white; font-weight: 800; font-size: 13px; font-family: inherit; cursor: pointer; }
        .filter-tab.active { background: var(--pika-dark); color: var(--pika-yellow); }
        .bulk-btn { background: var(--pika-brown); color: white; border: none; padding: 6px 15px; border-radius: 15px; font-size: 12px; font-weight: 900; cursor: pointer; margin-left: auto; font-family: inherit; }

        /* 卡牌方格 */
        .card-grid { display: grid; gap: 12px; padding: 15px; grid-template-columns: repeat(2, 1fr); }
        .grid-item { background: white; border-radius: 16px; padding: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.06); position: relative; border: 2px solid #eee; cursor: pointer; }
        .grid-img-box { width: 100%; height: 160px; border-radius: 10px; background: #eee; overflow: hidden; margin-bottom: 8px; }
        .grid-img-box img { width: 100%; height: 100%; object-fit: cover; }
        .grid-sn { font-size: 10px; background: var(--pika-dark); color: var(--pika-yellow); padding: 2px 6px; border-radius: 4px; position: absolute; top: 18px; left: 18px; font-weight: 800; }
        .grid-sold { position: absolute; top: 18px; right: 18px; background: rgba(38,28,20,0.85); color: white; font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
        .up-text { color: var(--up); font-weight: 900; }
        .down-text { color: var(--down); font-weight: 900; }

        /* 電腦版適配 */
        .desktop-view .card-grid { grid-template-columns: repeat(4, 1fr); max-width: 1000px; margin: 0 auto; }
        .desktop-view .dashboard, .desktop-view .header { max-width: 1000px; margin: 0 auto; }

        /* 彈窗 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 200; align-items: center; justify-content: center; backdrop-filter: blur(3px); }
        .modal-container { background: white; width: 92%; max-width: 500px; border-radius: 20px; border: 4px solid var(--pika-dark); overflow: hidden; margin: 20px auto; }
        .modal-content { padding: 20px; max-height: 75vh; overflow-y: auto; }
        .info-group { margin-bottom: 12px; border-bottom: 2px dashed #eee; padding-bottom: 8px; }
        .info-label { font-size: 11px; color: #888; font-weight: bold; }
        .info-value { font-size: 15px; font-weight: 800; }
        
        /* 圖表 */
        .chart-wrapper { margin-top: 20px; border: 2px solid #ddd; padding: 12px; border-radius: 12px; background: #fff; }
        .chart-tabs { display: flex; background: #f0f0f0; border-radius: 8px; overflow: hidden; border: 1px solid #ccc; }
        .chart-tab { flex: 1; padding: 6px; font-size: 12px; border: none; background: transparent; cursor: pointer; font-weight: 800; font-family: inherit; }
        .chart-tab.active { background: var(--pika-brown); color: white; }

        /* 表單 */
        .form-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 300; align-items: center; justify-content: center; }
        .form-box { background: white; width: 92%; max-width: 500px; max-height: 90%; border-radius: 20px; padding: 25px; overflow-y: auto; border: 4px solid var(--pika-dark); }
        .input-item { margin-bottom: 15px; }
        .input-item label { display: block; font-size: 13px; font-weight: 900; margin-bottom: 5px; }
        .input-item input, .input-item select, .input-item textarea { width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; font-family: inherit; box-sizing: border-box; }

        .fab { position: fixed; bottom: 25px; right: 25px; background: var(--pika-yellow); border: 4px solid var(--pika-dark); color: var(--pika-dark); width: 64px; height: 64px; border-radius: 32px; font-size: 34px; display: flex; align-items: center; justify-content: center; font-weight: 900; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.2); cursor: pointer; }
    </style>
</head>
<body class="mobile-view">

<div id="loginScreen">
    <div style="font-size: 24px; font-weight: 900; margin-bottom: 20px;">⚡ PTCG 帳務管理</div>
    <div class="pin-dots">
        <span class="dot" id="dot-0"></span><span class="dot" id="dot-1"></span>
        <span class="dot" id="dot-2"></span><span class="dot" id="dot-3"></span>
    </div>
    <div class="numpad">
        <button onclick="pressKey('1')">1</button><button onclick="pressKey('2')">2</button><button onclick="pressKey('3')">3</button>
        <button onclick="pressKey('4')">4</button><button onclick="pressKey('5')">5</button><button onclick="pressKey('6')">6</button>
        <button onclick="pressKey('7')">7</button><button onclick="pressKey('8')">8</button><button onclick="pressKey('9')">9</button>
        <div></div><button onclick="pressKey('0')">0</button><button onclick="pressKey('back')">⌫</button>
    </div>
</div>

<div class="dashboard">
    <div class="stat-card">
        <div class="stat-label">持倉總損益 (未實現)</div>
        <div id="stat-active" class="stat-value">--</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">售出總損益 (已實現)</div>
        <div id="stat-sold" class="stat-value">--</div>
    </div>
    <div class="stat-card" style="grid-column: span 2;">
        <div class="stat-label">所有卡牌累積總盈虧</div>
        <div id="stat-total" class="stat-value" style="font-size: 24px;">--</div>
    </div>
</div>

<div class="header">
    <div class="search-bar"><span>🔍</span><input type="text" id="searchInput" placeholder="搜尋名稱或序號..." oninput="renderGrid()"></div>
    <div class="filter-tabs">
        <button class="filter-tab active" id="filter-all" onclick="setFilter('all')">全部</button>
        <button class="filter-tab" id="filter-active" onclick="setFilter('active')">持倉</button>
        <button class="filter-tab" id="filter-sold" onclick="setFilter('sold')">售出</button>
        <button class="bulk-btn" onclick="openBulkUpdate()">批量行情</button>
    </div>
</div>

<div id="cardGrid" class="card-grid"></div>
<button class="fab" onclick="openForm()">＋</button>

<div id="detailModal" class="modal">
    <div class="modal-container">
        <div class="modal-content" id="detailContent"></div>
    </div>
</div>

<div id="formModal" class="form-modal">
    <div class="form-box">
        <h3 id="formTitle">錄入卡牌</h3>
        <div class="input-item">
            <div onclick="document.getElementById('fileInput').click()" style="height:150px; border:3px dashed var(--pika-brown); border-radius:15px; display:flex; align-items:center; justify-content:center; overflow:hidden; background:#fafafa; cursor:pointer;">
                <img id="previewImg" style="display:none; width:100%; height:100%; object-fit:contain;">
                <span id="uploadHint">📸 上傳照片</span>
            </div>
            <input type="file" id="fileInput" accept="image/*" style="display:none;" onchange="previewFile(this)">
        </div>
        <div class="input-item"><label>寶可夢名稱</label><input type="text" id="name"></div>
        <div class="input-item" style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
            <div><label>卡牌序號</label><input type="text" id="sn"></div>
            <div><label>POP 張數</label><input type="number" id="popCount"></div>
        </div>
        <div class="input-item"><label>認證序號</label><input type="text" id="certId"></div>
        <div class="input-item" style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
            <div><label>購入管道</label><input type="text" id="source"></div>
            <div><label>購買日期</label><input type="date" id="buyDate"></div>
        </div>
        <div class="input-item" style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
            <div><label>買進價格</label><input type="number" id="buyPrice"></div>
            <div><label>行情時價</label><input type="number" id="currentPrice"></div>
        </div>
        <div id="soldSection" style="background:#fff9e6; padding:10px; border-radius:10px; border:1px solid var(--pika-yellow); margin-bottom:15px;">
            <div class="input-item" style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:0;">
                <div><label>售出日期</label><input type="date" id="sellDate"></div>
                <div><label>💰 售出價格</label><input type="number" id="sellPrice" placeholder="未賣免填"></div>
            </div>
        </div>
        <div class="input-item"><label>狀態</label><select id="isSold"><option value="false">📦 持倉中</option><option value="true">🤝 已賣出</option></select></div>
        <div class="input-item"><label>備註</label><textarea id="memo" rows="2"></textarea></div>
        <button onclick="saveData()" style="width:100%; padding:15px; background:var(--pika-brown); color:white; border:none; border-radius:12px; font-weight:900; cursor:pointer;">確認儲存</button>
        <button onclick="closeForm()" style="width:100%; padding:12px; background:#eee; border:none; border-radius:12px; margin-top:10px; cursor:pointer;">取消</button>
    </div>
</div>

<script>
    // 密碼盤邏輯
    let currentPin = '';
    function pressKey(key) {
        if (key === 'back') currentPin = currentPin.slice(0, -1);
        else if (currentPin.length < 4) currentPin += key;
        for (let i = 0; i < 4; i++) document.getElementById(`dot-${i}`).className = i < currentPin.length ? 'dot filled' : 'dot';
        if (currentPin.length === 4) {
            setTimeout(() => {
                if (currentPin === '0000') { document.body.className = 'mobile-view'; document.getElementById('loginScreen').style.display = 'none'; }
                else if (currentPin === '1234') { document.body.className = 'desktop-view'; document.getElementById('loginScreen').style.display = 'none'; }
                else { Swal.fire("錯誤", "密碼不正確！", "error"); currentPin = ''; for (let i = 0; i < 4; i++) document.getElementById(`dot-${i}`).className = 'dot'; }
            }, 150);
        }
    }

    // Firebase 配置 (已套用你的專案 ID)
    const firebaseConfig = {
      apiKey: "AIzaSyCa_vS9uZ1niPmXQjlmWT1q6h16S_btALU",
      authDomain: "ptcg-1645a.firebaseapp.com",
      projectId: "ptcg-1645a",
      storageBucket: "ptcg-1645a.firebasestorage.app", 
      messagingSenderId: "736309614311",
      appId: "1:736309614311:web:1352e643e04be0a35d7442"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const storage = firebase.storage();
    
    let allCards = [];
    let currentCardId = null;
    let currentFilter = 'all';
    let currentChart = null;

    function setFilter(type) {
        currentFilter = type;
        document.querySelectorAll('.filter-tab').forEach(el => el.classList.remove('active'));
        document.getElementById(`filter-${type}`).classList.add('active');
        renderGrid();
    }

    function previewFile(input) {
        const file = input.files[0];
        if (file) {
            document.getElementById('previewImg').src = URL.createObjectURL(file);
            document.getElementById('previewImg').style.display = 'block';
            document.getElementById('uploadHint').style.display = 'none';
        }
    }

    function openForm(editData = null, isCopy = false) {
        currentCardId = (editData && !isCopy) ? editData.id : null;
        document.getElementById('formModal').style.display = 'flex';
        document.getElementById('formTitle').innerText = currentCardId ? "✏️ 修改資訊" : "➕ 錄入卡牌";
        
        document.getElementById('name').value = editData ? editData.name : "";
        document.getElementById('sn').value = editData ? editData.sn : "";
        document.getElementById('certId').value = editData ? (isCopy ? "" : editData.certId) : "";
        document.getElementById('popCount').value = editData ? editData.popCount : "";
        document.getElementById('source').value = editData ? editData.source : "";
        document.getElementById('buyDate').value = editData ? editData.buyDate : "";
        document.getElementById('sellDate').value = (editData && !isCopy) ? (editData.sellDate || "") : "";
        document.getElementById('sellPrice').value = (editData && !isCopy) ? (editData.sellPrice || "") : "";
        document.getElementById('buyPrice').value = editData ? editData.buyPrice : "";
        document.getElementById('currentPrice').value = editData ? editData.currentPrice : "";
        document.getElementById('memo').value = editData ? editData.memo : "";
        document.getElementById('isSold').value = (editData && !isCopy) ? String(editData.isSold) : "false";

        const preview = document.getElementById('previewImg');
        const hint = document.getElementById('uploadHint');
        if (editData && editData.imageUrl) { preview.src = editData.imageUrl; preview.style.display = 'block'; hint.style.display = 'none'; }
        else { preview.style.display = 'none'; hint.style.display = 'block'; }
    }

    function closeForm() { document.getElementById('formModal').style.display = 'none'; }

    async function saveData() {
        const name = document.getElementById('name').value;
        const file = document.getElementById('fileInput').files[0];
        if (!name) return Swal.fire("提醒", "名稱必填", "warning");

        Swal.fire({ title: '處理中...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

        try {
            let imageUrl = currentCardId ? (allCards.find(c => c.id === currentCardId).imageUrl || "") : "";
            if (file) {
                const imgRef = storage.ref(`cards/${Date.now()}`);
                await imgRef.put(file);
                imageUrl = await imgRef.getDownloadURL();
            }

            const currentPrice = parseFloat(document.getElementById('currentPrice').value) || 0;
            const today = new Date().toLocaleDateString();

            const data = {
                name,
                sn: document.getElementById('sn').value,
                certId: document.getElementById('certId').value,
                popCount: parseInt(document.getElementById('popCount').value) || 0,
                source: document.getElementById('source').value,
                buyDate: document.getElementById('buyDate').value,
                sellDate: document.getElementById('sellDate').value,
                sellPrice: parseFloat(document.getElementById('sellPrice').value) || 0,
                buyPrice: parseFloat(document.getElementById('buyPrice').value) || 0,
                currentPrice: currentPrice,
                isSold: document.getElementById('isSold').value === 'true',
                memo: document.getElementById('memo').value,
                imageUrl,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            };

            if (currentCardId) {
                const oldCard = allCards.find(c => c.id === currentCardId);
                let history = oldCard.history || [];
                if (history.length === 0 || history[history.length-1].date !== today) {
                    history.push({ date: today, price: currentPrice });
                } else {
                    history[history.length-1].price = currentPrice;
                }
                data.history = history;
                await db.collection("cards").doc(currentCardId).update(data);
            } else {
                data.history = [{ date: today, price: currentPrice }];
                await db.collection("cards").add(data);
            }

            Swal.fire("成功", "已保存", "success");
            closeForm();
            document.getElementById('detailModal').style.display = 'none';
        } catch (e) { Swal.fire("錯誤", e.message, "error"); }
    }

    // 財務計算邏輯 (核心優化)
    function calculateFinancials() {
        let activeGain = 0, soldGain = 0;
        allCards.forEach(c => {
            const buy = c.buyPrice || 0;
            if (c.isSold) {
                // 已售出：使用售價計算實際獲利
                const sell = c.sellPrice || 0;
                soldGain += (sell - buy);
            } else {
                // 持倉中：使用時價計算帳面盈虧
                const current = c.currentPrice || 0;
                activeGain += (current - buy);
            }
        });
        
        const updateStat = (id, val) => {
            const el = document.getElementById(id);
            el.innerText = (val >= 0 ? '+' : '') + val.toLocaleString();
            el.className = 'stat-value ' + (val >= 0 ? 'up' : 'down');
        };

        updateStat('stat-active', activeGain);
        updateStat('stat-sold', soldGain);
        updateStat('stat-total', activeGain + soldGain);
    }

    async function openBulkUpdate() {
        const activeCards = allCards.filter(c => !c.isSold);
        if (activeCards.length === 0) return Swal.fire("無持倉", "沒有卡牌可以更新行情", "info");

        let html = activeCards.map(c => `
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; border-bottom:1px solid #eee; padding-bottom:8px;">
                <div style="text-align:left; font-size:12px;"><b>${c.name}</b><br><small>#${c.sn}</small></div>
                <input type="number" class="bulk-input" data-id="${c.id}" value="${c.currentPrice}" style="width:90px; padding:6px; border-radius:8px; border:1px solid #ddd; font-family:inherit; font-weight:bold;">
            </div>
        `).join('');

        const { value: res } = await Swal.fire({
            title: '批量更新時價',
            html: `<div style="max-height:350px; overflow-y:auto; padding:10px;">${html}</div>`,
            showCancelButton: true,
            confirmButtonText: '更新全部',
            preConfirm: () => Array.from(document.querySelectorAll('.bulk-input')).map(i => ({ id: i.dataset.id, price: parseFloat(i.value) }))
        });

        if (res) {
            Swal.fire({ title: '同步中...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            const today = new Date().toLocaleDateString();
            const batch = db.batch();
            res.forEach(item => {
                const card = allCards.find(c => c.id === item.id);
                let history = card.history || [];
                if (history.length === 0 || history[history.length-1].date !== today) {
                    history.push({ date: today, price: item.price });
                } else {
                    history[history.length-1].price = item.price;
                }
                batch.update(db.collection("cards").doc(item.id), { currentPrice: item.price, history: history });
            });
            await batch.commit();
            Swal.fire("成功", "行情已更新", "success");
        }
    }

    db.collection("cards").orderBy("updatedAt", "desc").onSnapshot(snap => {
        allCards = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        calculateFinancials();
        renderGrid();
    });

    function renderGrid() {
        const search = document.getElementById('searchInput').value.toLowerCase();
        const grid = document.getElementById('cardGrid');
        grid.innerHTML = "";
        const filtered = allCards.filter(c => {
            const matchSearch = (c.name || '').toLowerCase().includes(search) || (c.sn || '').toLowerCase().includes(search);
            const matchFilter = currentFilter === 'all' || (currentFilter === 'active' ? !c.isSold : c.isSold);
            return matchSearch && matchFilter;
        });

        filtered.forEach(c => {
            const buy = c.buyPrice || 0;
            const current = c.currentPrice || 0;
            const diff = c.isSold ? ((c.sellPrice || 0) - buy) : (current - buy);
            const percent = buy ? ((diff/buy)*100).toFixed(1) : 0;
            grid.innerHTML += `
                <div class="grid-item" onclick="showDetail('${c.id}')">
                    <div class="grid-sn">#${c.sn}</div>
                    ${c.isSold ? '<div class="grid-sold">已售出</div>' : ''}
                    <div class="grid-img-box"><img src="${c.imageUrl || 'https://via.placeholder.com/150'}"></div>
                    <div style="font-weight:900; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${c.name}</div>
                    <div style="font-size:11px; color:#888;">買入: $${buy.toLocaleString()}</div>
                    <div class="grid-price-row">
                        <div>${c.isSold ? '售出:' : '時價:'}</div>
                        <div class="${diff>=0?'up-text':'down-text'}">$${(c.isSold ? (c.sellPrice || 0) : current).toLocaleString()} (${diff>=0?'+':''}${percent}%)</div>
                    </div>
                </div>
            `;
        });
    }

    function showDetail(id) {
        const card = allCards.find(c => c.id === id);
        if (!card) return;
        const buy = card.buyPrice || 0;
        const diff = card.isSold ? ((card.sellPrice || 0) - buy) : (card.currentPrice - buy);
        const percent = buy ? ((diff/buy)*100).toFixed(1) : 0;

        document.getElementById('detailContent').innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <b style="font-size:18px;">${card.name}</b>
                <button onclick="document.getElementById('detailModal').style.display='none'" style="border:none; background:none; font-size:24px; cursor:pointer;">×</button>
            </div>
            <img src="${card.imageUrl || 'https://via.placeholder.com/300'}" style="width:100%; border-radius:12px; margin-bottom:15px; border:2px solid #ccc;">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                <div class="info-group"><div class="info-label">卡牌序號</div><div class="info-value">#${card.sn}</div></div>
                <div class="info-group"><div class="info-label">POP 張數</div><div class="info-value">${card.popCount || 0}</div></div>
                <div class="info-group" style="grid-column: span 2;"><div class="info-label">認證序號</div><div class="info-value">${card.certId || '-'}</div></div>
                <div class="info-group"><div class="info-label">購入管道</div><div class="info-value">${card.source || '-'}</div></div>
                <div class="info-group"><div class="info-label">購買日期</div><div class="info-value">${card.buyDate || '-'}</div></div>
                <div class="info-group"><div class="info-label">買進價格</div><div class="info-value">$${buy.toLocaleString()}</div></div>
                <div class="info-group"><div class="info-label">當前行情</div><div class="info-value">$${(card.currentPrice || 0).toLocaleString()}</div></div>
                ${card.isSold ? `
                    <div class="info-group"><div class="info-label">售出日期</div><div class="info-value">${card.sellDate || '-'}</div></div>
                    <div class="info-group" style="background:#fff3cd; padding:5px; border-radius:5px;"><div class="info-label">售出價格</div><div class="info-value" style="color:var(--pika-brown)">$${(card.sellPrice || 0).toLocaleString()}</div></div>
                ` : ''}
                <div class="info-group" style="grid-column: span 2;">
                    <div class="info-label">累積損益</div>
                    <div class="info-value ${diff>=0?'up-text':'down-text'}">$${diff.toLocaleString()} (${diff>=0?'+':''}${percent}%)</div>
                </div>
            </div>
            <div class="info-group" style="margin-top:10px;"><div class="info-label">備註</div><div class="info-value" style="font-weight:normal; font-size:14px;">${card.memo || '無'}</div></div>
            
            <div class="chart-wrapper">
                <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                    <b style="font-size:12px;">📈 走勢</b>
                    <div class="chart-tabs">
                        <button class="chart-tab active" id="tab-day" onclick="updateChart('day')">日</button>
                        <button class="chart-tab" id="tab-week" onclick="updateChart('week')">周</button>
                        <button class="chart-tab" id="tab-month" onclick="updateChart('month')">月</button>
                    </div>
                </div>
                <div class="chart-box"><canvas id="priceChart"></canvas></div>
            </div>

            <div class="action-btns">
                <button class="btn-action" style="flex:1; padding:12px; border-radius:10px; font-weight:900; background:var(--pika-yellow); border:none; margin:5px; cursor:pointer;" onclick="openForm(allCards.find(c=>c.id=='${id}'), true)">📋 複製</button>
                <button class="btn-action" style="flex:1; padding:12px; border-radius:10px; font-weight:900; background:var(--pika-dark); color:white; border:none; margin:5px; cursor:pointer;" onclick="openForm(allCards.find(c=>c.id=='${id}'))">✏️ 修改</button>
                <button class="btn-action" style="flex:1; padding:12px; border-radius:10px; font-weight:900; background:#d9534f; color:white; border:none; margin:5px; cursor:pointer;" onclick="deleteCard('${id}')">🗑️ 刪除</button>
            </div>
        `;
        document.getElementById('detailModal').style.display = 'flex';
        renderChart(card, 'day');
    }

    function renderChart(card, type) {
        const history = card.history || [];
        const ctx = document.getElementById('priceChart').getContext('2d');
        if (currentChart) currentChart.destroy();
        
        // 簡單的資料過濾邏輯
        let filtered = history;
        const labels = filtered.map(h => h.date);
        const data = filtered.map(h => h.price);

        currentChart = new Chart(ctx, {
            type: 'line',
            data: { labels, datasets: [{ data, borderColor: 'rgb(160, 78, 6)', backgroundColor: 'rgba(160, 78, 6, 0.1)', fill: true, tension: 0.3 }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { ticks: { maxTicksLimit: 5, font: { family: 'Nunito' } } } } }
        });
    }

    async function deleteCard(id) {
        const result = await Swal.fire({ title: '刪除確認', text: "刪除後資料無法找回", icon: 'warning', showCancelButton: true, confirmButtonColor: '#d9534f' });
        if (result.isConfirmed) {
            await db.collection("cards").doc(id).delete();
            document.getElementById('detailModal').style.display = 'none';
        }
    }
</script>
</body>
</html>
