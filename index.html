<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PTCG Pro 3.5 專業財務版</title>
    
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;800&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root { 
            --pika-yellow: #f3cf3f; 
            --pika-dark: #261c14; 
            --pika-brown: #a04e06; 
            --pika-blue: #2468b1;
            --pika-red: #eb4034;
            --up: #eb4034; 
            --down: #1fa139; 
        }
        body { font-family: 'Nunito', 'M PLUS Rounded 1c', sans-serif; background: #f8f8f8; margin: 0; padding-bottom: 100px; color: var(--pika-dark); }
        
        /* 登入畫面 */
        #loginScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--pika-yellow); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .pin-dots { display: flex; gap: 15px; margin-bottom: 30px; }
        .dot { width: 18px; height: 18px; border-radius: 50%; border: 3px solid var(--pika-dark); background: transparent; transition: 0.2s; }
        .dot.filled { background: var(--pika-dark); }
        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .numpad button { width: 75px; height: 75px; border-radius: 50%; background: white; color: var(--pika-blue); font-size: 32px; font-weight: 900; border: 3px solid var(--pika-dark); box-shadow: 0 5px 0 var(--pika-dark); cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* 財務儀表板 */
        .dashboard { background: var(--pika-dark); color: white; padding: 15px; border-radius: 0 0 20px 20px; display: flex; flex-direction: column; gap: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .dash-section { background: rgba(255,255,255,0.08); border-radius: 12px; padding: 12px; border: 1px solid rgba(255,255,255,0.15); }
        .dash-section-title { font-size: 13px; color: var(--pika-yellow); font-weight: 900; margin-bottom: 8px; border-bottom: 1px solid rgba(243,207,63,0.3); padding-bottom: 4px; }
        .dash-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .stat-item { display: flex; flex-direction: column; }
        .stat-label { font-size: 11px; color: #bbb; }
        .stat-value { font-size: 16px; font-weight: 900; }
        .total-section { display: flex; justify-content: space-between; align-items: center; background: rgba(243, 207, 63, 0.15); border: 1px solid var(--pika-yellow); padding: 10px; border-radius: 10px; }

        /* Header */
        .header { background: var(--pika-yellow); padding: 15px; border-bottom: 4px solid var(--pika-dark); position: sticky; top: 0; z-index: 100; border-radius: 0 0 15px 15px; }
        .search-bar { background: white; border-radius: 20px; padding: 10px 15px; border: 2px solid var(--pika-dark); display: flex; align-items: center; }
        .search-bar input { border: none; outline: none; width: 100%; font-size: 16px; font-weight: bold; font-family: inherit; }
        
        .control-row { display: flex; gap: 8px; margin-top: 10px; align-items: center; }
        .sort-select { flex: 1; padding: 8px; border-radius: 15px; border: 2px solid var(--pika-dark); font-weight: 800; font-family: inherit; font-size: 13px; }
        .bulk-btn { background: var(--pika-red); color: white; border: 2px solid var(--pika-dark); padding: 8px 15px; border-radius: 15px; font-size: 12px; font-weight: 900; cursor: pointer; }

        /* 卡牌方格 */
        .card-grid { display: grid; gap: 12px; padding: 15px; grid-template-columns: repeat(2, 1fr); }
        .grid-item { background: white; border-radius: 16px; padding: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.06); position: relative; border: 2px solid #eee; cursor: pointer; transition: transform 0.1s; }
        .grid-item:active { transform: scale(0.97); }
        .grid-img-box { width: 100%; height: 160px; border-radius: 10px; background: #eee; overflow: hidden; margin-bottom: 8px; }
        .grid-img-box img { width: 100%; height: 100%; object-fit: cover; }
        .grid-sn { font-size: 10px; background: var(--pika-blue); color: white; padding: 2px 6px; border-radius: 4px; position: absolute; top: 18px; left: 18px; font-weight: 800; }
        .grid-sold { position: absolute; top: 18px; right: 18px; background: rgba(38,28,20,0.85); color: white; font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; }

        .up-text { color: var(--up); font-weight: 900; }
        .down-text { color: var(--down); font-weight: 900; }

        .desktop-view .card-grid { grid-template-columns: repeat(4, 1fr); max-width: 1000px; margin: 0 auto; }
        .desktop-view .dashboard, .desktop-view .header { max-width: 1000px; margin: 0 auto; }

        /* 其他 Modal 樣式保持原本 ... */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 200; align-items: center; justify-content: center; backdrop-filter: blur(3px); }
        .modal-container { background: white; width: 92%; max-width: 500px; border-radius: 20px; border: 4px solid var(--pika-dark); overflow: hidden; }
        .form-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 300; align-items: center; justify-content: center; }
        .form-box { background: white; width: 92%; max-width: 500px; max-height: 90%; border-radius: 20px; padding: 25px; overflow-y: auto; border: 4px solid var(--pika-dark); }
        .input-item { margin-bottom: 15px; }
        .input-item label { display: block; font-size: 13px; font-weight: 900; margin-bottom: 5px; }
        .input-item input, .input-item select, .input-item textarea { width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; font-family: inherit; }
        .fab { position: fixed; bottom: 25px; right: 25px; background: var(--pika-yellow); border: 4px solid var(--pika-dark); color: var(--pika-dark); width: 64px; height: 64px; border-radius: 50%; font-size: 34px; display: flex; align-items: center; justify-content: center; font-weight: 900; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.2); cursor: pointer; }
    </style>
</head>
<body class="mobile-view">

<div id="loginScreen">
    <div style="font-size: 24px; font-weight: 900; margin-bottom: 20px; color: var(--pika-brown)">⚡ PTCG 帳務管理 Pro</div>
    <div class="pin-dots">
        <span class="dot" id="dot-0"></span><span class="dot" id="dot-1"></span>
        <span class="dot" id="dot-2"></span><span class="dot" id="dot-3"></span>
    </div>
    <div class="numpad">
        <button onclick="pressKey('1')">1</button><button onclick="pressKey('2')">2</button><button onclick="pressKey('3')">3</button>
        <button onclick="pressKey('4')">4</button><button onclick="pressKey('5')">5</button><button onclick="pressKey('6')">6</button>
        <button onclick="pressKey('7')">7</button><button onclick="pressKey('8')">8</button><button onclick="pressKey('9')">9</button>
        <div></div><button onclick="pressKey('0')">0</button><button onclick="pressKey('back')">⌫</button>
    </div>
</div>

<div class="dashboard">
    <div class="dash-section">
        <div class="dash-section-title">📦 持倉統計 (未實現)</div>
        <div class="dash-grid">
            <div class="stat-item"><div class="stat-label">目前市值</div><div class="stat-value" id="stat-active-market">$0</div></div>
            <div class="stat-item"><div class="stat-label">持倉損益</div><div class="stat-value" id="stat-active-gain">0</div></div>
        </div>
    </div>
    <div class="dash-section total-section">
        <div class="stat-label" style="color:var(--pika-dark); font-size:14px; font-weight: 900;">⚡ 累積盈虧</div>
        <div class="stat-value" id="stat-total" style="font-size: 22px; color: var(--pika-dark);">--</div>
    </div>
</div>

<div class="header">
    <div class="search-bar"><span>🔍</span><input type="text" id="searchInput" placeholder="搜尋名稱或序號..." oninput="renderGrid()"></div>
    <div class="control-row">
        <select id="sortSelect" class="sort-select" onchange="renderGrid()">
            <option value="updatedAt">📅 最近更新</option>
            <option value="buyPriceDesc">💰 價格: 高到低</option>
            <option value="buyPriceAsc">💰 價格: 低到高</option>
            <option value="sn">🔢 序號排序</option>
            <option value="buyDate">🗓️ 買入時間</option>
        </select>
        <button class="bulk-btn" onclick="openBulkUpdate()">批量行情</button>
    </div>
    <div style="display: flex; gap: 8px; margin-top: 10px;">
        <button class="filter-tab active" id="filter-all" onclick="setFilter('all')" style="flex:1; padding:8px; border-radius:15px; border:2px solid var(--pika-dark); background:white; font-weight:800;">全部</button>
        <button class="filter-tab" id="filter-active" onclick="setFilter('active')" style="flex:1; padding:8px; border-radius:15px; border:2px solid var(--pika-dark); background:white; font-weight:800;">持倉</button>
        <button class="filter-tab" id="filter-sold" onclick="setFilter('sold')" style="flex:1; padding:8px; border-radius:15px; border:2px solid var(--pika-dark); background:white; font-weight:800;">售出</button>
    </div>
</div>

<div id="cardGrid" class="card-grid"></div>
<button class="fab" onclick="openForm()">＋</button>

<div id="detailModal" class="modal">
    <div class="modal-container"><div class="modal-content" id="detailContent"></div></div>
</div>

<div id="formModal" class="form-modal">
    <div class="form-box">
        <h3 id="formTitle">錄入卡牌</h3>
        <div class="input-item">
            <div onclick="document.getElementById('fileInput').click()" style="height:150px; border:3px dashed var(--pika-brown); border-radius:15px; display:flex; align-items:center; justify-content:center; overflow:hidden; background:#fafafa; cursor:pointer;">
                <img id="previewImg" style="display:none; width:100%; height:100%; object-fit:contain;">
                <span id="uploadHint">📸 上傳照片</span>
            </div>
            <input type="file" id="fileInput" accept="image/*" style="display:none;" onchange="previewFile(this)">
        </div>
        <div class="input-item"><label>寶可夢名稱</label><input type="text" id="name"></div>
        <div class="input-item" style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
            <div><label>序號</label><input type="text" id="sn"></div>
            <div><label>買進價格</label><input type="number" id="buyPrice"></div>
        </div>
        <div class="input-item" style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
            <div><label>行情時價</label><input type="number" id="currentPrice"></div>
            <div><label>購買日期</label><input type="date" id="buyDate"></div>
        </div>
        <div class="input-item"><label>狀態</label>
            <select id="isSold" onchange="document.getElementById('soldInputSection').style.display = this.value=='true'?'block':'none'">
                <option value="false">📦 持倉中</option><option value="true">🤝 已賣出</option>
            </select>
        </div>
        <div id="soldInputSection" style="display:none; background:#fff3cd; padding:10px; border-radius:10px; margin-bottom:15px;">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                <div><label>售出價格</label><input type="number" id="sellPrice"></div>
                <div><label>售出日期</label><input type="date" id="sellDate"></div>
            </div>
        </div>
        <div class="input-item"><label>備註</label><textarea id="memo" rows="2"></textarea></div>
        <button onclick="saveData()" style="width:100%; padding:15px; background:var(--pika-blue); color:white; border:none; border-radius:12px; font-weight:900; cursor:pointer;">確認儲存</button>
        <button onclick="closeForm()" style="width:100%; padding:12px; background:#eee; border:none; border-radius:12px; margin-top:10px; cursor:pointer;">取消</button>
    </div>
</div>

<script>
    // --- 密碼與登入模式修正 ---
    let currentPin = '';
    function pressKey(key) {
        if (key === 'back') currentPin = currentPin.slice(0, -1);
        else if (currentPin.length < 4) currentPin += key;
        
        for (let i = 0; i < 4; i++) {
            document.getElementById(`dot-${i}`).className = i < currentPin.length ? 'dot filled' : 'dot';
        }

        if (currentPin.length === 4) {
            setTimeout(() => {
                if (currentPin === '0000') { 
                    document.body.className = 'mobile-view'; 
                    document.getElementById('loginScreen').style.display = 'none'; 
                } 
                else if (currentPin === '1234') { 
                    document.body.className = 'desktop-view'; 
                    document.getElementById('loginScreen').style.display = 'none'; 
                } 
                else { 
                    Swal.fire("錯誤", "密碼不正確！", "error"); 
                    currentPin = ''; 
                    for (let i = 0; i < 4; i++) document.getElementById(`dot-${i}`).className = 'dot';
                }
            }, 150);
        }
    }

    // Firebase 配置 (沿用原本)
    const firebaseConfig = {
      apiKey: "AIzaSyCa_vS9uZ1niPmXQjlmWT1q6h16S_btALU",
      authDomain: "ptcg-1645a.firebaseapp.com",
      projectId: "ptcg-1645a",
      storageBucket: "ptcg-1645a.firebasestorage.app", 
      messagingSenderId: "736309614311",
      appId: "1:736309614311:web:1352e643e04be0a35d7442"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const storage = firebase.storage();
    
    let allCards = [];
    let currentFilter = 'all';

    // --- 批量行情優化：同名同序號合併 ---
    async function openBulkUpdate() {
        const activeCards = allCards.filter(c => !c.isSold);
        if (activeCards.length === 0) return Swal.fire("無持倉", "", "info");

        // 分組
        const groups = {};
        activeCards.forEach(c => {
            const key = `${c.name}_${c.sn}`;
            if (!groups[key]) groups[key] = { name: c.name, sn: c.sn, price: c.currentPrice, ids: [] };
            groups[key].ids.push(c.id);
        });

        let html = Object.values(groups).map(g => `
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; border-bottom:1px solid #eee; padding-bottom:8px;">
                <div style="text-align:left; font-size:12px;"><b>${g.name}</b><br><small>#${g.sn} (${g.ids.length}張)</small></div>
                <input type="number" class="bulk-input" data-ids="${g.ids.join(',')}" value="${g.price}" style="width:90px; padding:6px; border-radius:8px; border:1px solid #ddd; font-weight:bold;">
            </div>
        `).join('');

        const { value: res } = await Swal.fire({
            title: '批量更新時價',
            html: `<div style="max-height:350px; overflow-y:auto; padding:10px;">${html}</div>`,
            showCancelButton: true,
            confirmButtonText: '全部更新',
            preConfirm: () => Array.from(document.querySelectorAll('.bulk-input')).map(i => ({ ids: i.dataset.ids.split(','), price: parseFloat(i.value) }))
        });

        if (res) {
            Swal.fire({ title: '同步中...', didOpen: () => Swal.showLoading() });
            const today = new Date().toLocaleDateString();
            const batch = db.batch();
            res.forEach(group => {
                group.ids.forEach(id => {
                    const card = allCards.find(c => c.id === id);
                    let history = card.history || [];
                    history.push({ date: today, price: group.price });
                    batch.update(db.collection("cards").doc(id), { currentPrice: group.price, history: history });
                });
            });
            await batch.commit();
            Swal.fire("成功", "行情已同步", "success");
        }
    }

    // --- 渲染與排序 ---
    function renderGrid() {
        const search = document.getElementById('searchInput').value.toLowerCase();
        const sortBy = document.getElementById('sortSelect').value;
        const grid = document.getElementById('cardGrid');
        
        let filtered = allCards.filter(c => {
            const matchSearch = (c.name || '').toLowerCase().includes(search) || (c.sn || '').toLowerCase().includes(search);
            const matchFilter = currentFilter === 'all' || (currentFilter === 'active' ? !c.isSold : c.isSold);
            return matchSearch && matchFilter;
        });

        // 排序邏輯
        filtered.sort((a, b) => {
            if (sortBy === 'buyPriceDesc') return (b.buyPrice || 0) - (a.buyPrice || 0);
            if (sortBy === 'buyPriceAsc') return (a.buyPrice || 0) - (b.buyPrice || 0);
            if (sortBy === 'sn') return (a.sn || '').localeCompare(b.sn || '');
            if (sortBy === 'buyDate') return new Date(b.buyDate) - new Date(a.buyDate);
            return (b.updatedAt?.seconds || 0) - (a.updatedAt?.seconds || 0);
        });

        grid.innerHTML = filtered.map(c => {
            const buy = c.buyPrice || 0;
            const diff = c.isSold ? ((c.sellPrice || 0) - buy) : (c.currentPrice - buy);
            const percent = buy ? ((diff/buy)*100).toFixed(1) : 0;
            return `
                <div class="grid-item" onclick="showDetail('${c.id}')">
                    <div class="grid-sn">#${c.sn}</div>
                    ${c.isSold ? '<div class="grid-sold">已售出</div>' : ''}
                    <div class="grid-img-box"><img src="${c.imageUrl || 'https://via.placeholder.com/150'}"></div>
                    <div style="font-weight:900; font-size:14px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${c.name}</div>
                    <div style="font-size:11px; color:#888;">成本: $${buy.toLocaleString()}</div>
                    <div class="${diff>=0?'up-text':'down-text'}">$${(c.isSold ? (c.sellPrice || 0) : c.currentPrice).toLocaleString()} (${diff>=0?'+':''}${percent}%)</div>
                </div>
            `;
        }).join('');
    }

    // 資料監聽與財務計算 (沿用並微調樣式)
    db.collection("cards").orderBy("updatedAt", "desc").onSnapshot(snap => {
        allCards = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        calculateFinancials();
        renderGrid();
    });

    function calculateFinancials() {
        let activeGain = 0, soldGain = 0, activeMarket = 0;
        allCards.forEach(c => {
            if (c.isSold) soldGain += ((c.sellPrice || 0) - (c.buyPrice || 0));
            else {
                activeMarket += (c.currentPrice || 0);
                activeGain += ((c.currentPrice || 0) - (c.buyPrice || 0));
            }
        });
        document.getElementById('stat-active-market').innerText = '$' + activeMarket.toLocaleString();
        const gainEl = document.getElementById('stat-active-gain');
        gainEl.innerText = (activeGain >= 0 ? '+' : '') + activeGain.toLocaleString();
        gainEl.className = 'stat-value ' + (activeGain >= 0 ? 'up-text' : 'down-text');
        
        const total = activeGain + soldGain;
        const totalEl = document.getElementById('stat-total');
        totalEl.innerText = (total >= 0 ? '+' : '') + total.toLocaleString();
    }

    function setFilter(type) {
        currentFilter = type;
        document.querySelectorAll('.filter-tab').forEach(btn => {
            btn.style.background = btn.id === `filter-${type}` ? 'var(--pika-dark)' : 'white';
            btn.style.color = btn.id === `filter-${type}` ? 'var(--pika-yellow)' : 'var(--pika-dark)';
        });
        renderGrid();
    }

    // 關閉與預覽功能
    function closeForm() { document.getElementById('formModal').style.display = 'none'; }
    function previewFile(input) {
        const file = input.files[0];
        if (file) {
            document.getElementById('previewImg').src = URL.createObjectURL(file);
            document.getElementById('previewImg').style.display = 'block';
            document.getElementById('uploadHint').style.display = 'none';
        }
    }
    
    // ... 其餘原本的 saveData, showDetail, deleteCard 函式皆與 3.2 版完全一致，確保資料傳輸無誤
</script>
</body>
</html>
