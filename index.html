<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PTCG 寶可夢圖鑑管理 (皮卡丘版)</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        /* 皮卡丘主題配色 */
        :root { 
            --pika-yellow: rgb(243, 207, 63); 
            --pika-dark: rgb(38, 28, 20); 
            --pika-brown: rgb(160, 78, 6); 
            --up-color: #eb4034; /* 台股紅 */
            --down-color: #1fa139; /* 台股綠 */
            --bg-gray: #f8f8f8; 
        }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg-gray); margin: 0; padding-bottom: 80px; color: var(--pika-dark); }
        
        /* 登入畫面 */
        #loginScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--pika-yellow); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .login-box { background: white; padding: 30px; border-radius: 15px; text-align: center; box-shadow: 0 10px 20px rgba(38, 28, 20, 0.2); border: 3px solid var(--pika-dark); width: 80%; max-width: 350px; }
        .login-box input { width: 100%; padding: 12px; margin: 15px 0; border: 2px solid #ccc; border-radius: 8px; font-size: 20px; text-align: center; box-sizing: border-box; }
        .login-box button { width: 100%; background: var(--pika-brown); color: white; border: none; padding: 12px; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }

        /* 頂部 Header */
        .header { background: var(--pika-yellow); color: var(--pika-dark); padding: 20px 15px 15px; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-bottom: 4px solid var(--pika-dark); }
        .title { font-size: 24px; font-weight: 900; letter-spacing: 1px; display: flex; align-items: center; justify-content: space-between; }
        .search-bar { background: white; border-radius: 20px; padding: 8px 15px; margin-top: 15px; display: flex; align-items: center; border: 2px solid var(--pika-dark); }
        .search-bar input { border: none; outline: none; width: 100%; font-size: 16px; margin-left: 8px; color: var(--pika-dark); }
        
        /* 方格展示區 (Grid) */
        .card-grid { display: grid; gap: 12px; padding: 15px; }
        .grid-item { background: white; border-radius: 12px; padding: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); position: relative; border: 2px solid #eee; cursor: pointer; }
        .grid-img-box { width: 100%; height: 160px; border-radius: 8px; background: #eee; overflow: hidden; margin-bottom: 8px; border: 1px solid #ccc; }
        .grid-img-box img { width: 100%; height: 100%; object-fit: cover; }
        .grid-sn { font-size: 12px; background: var(--pika-dark); color: var(--pika-yellow); padding: 2px 8px; border-radius: 4px; position: absolute; top: 15px; left: 15px; font-weight: bold; }
        .grid-sold { position: absolute; top: 15px; right: 15px; background: rgba(38,28,20,0.8); color: white; font-size: 11px; padding: 2px 6px; border-radius: 4px; }
        
        .grid-price-row { display: flex; justify-content: space-between; align-items: flex-end; margin-top: 5px; font-size: 13px; }
        .up-text { color: var(--up-color); font-weight: bold; }
        .down-text { color: var(--down-color); font-weight: bold; }

        /* 版本排版設定 */
        .mobile-view .card-grid { grid-template-columns: repeat(2, 1fr); }
        .desktop-view .header { max-width: 1000px; margin: 0 auto; border-radius: 0 0 15px 15px; }
        .desktop-view .card-grid { grid-template-columns: repeat(4, 1fr); max-width: 1000px; margin: 0 auto; }
        @media (min-width: 1200px) { .desktop-view .card-grid { grid-template-columns: repeat(5, 1fr); max-width: 1200px; } .desktop-view .header { max-width: 1200px; } }

        /* 詳細資訊彈窗 (Modal) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 200; overflow-y: auto; align-items: center; justify-content: center; }
        .modal-container { background: white; width: 95%; max-width: 500px; border-radius: 16px; overflow: hidden; border: 4px solid var(--pika-dark); margin: 20px auto; }
        .modal-header { background: var(--pika-yellow); color: var(--pika-dark); padding: 15px; text-align: center; font-weight: bold; font-size: 18px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--pika-dark); }
        .close-btn { background: none; border: none; color: var(--pika-dark); font-size: 28px; font-weight: bold; cursor: pointer; }
        
        .modal-content { padding: 20px; max-height: 70vh; overflow-y: auto; }
        .detail-img { width: 100%; max-height: 280px; object-fit: contain; background: #eee; border-radius: 12px; margin-bottom: 15px; border: 2px solid #ccc; }
        .info-group { margin-bottom: 12px; border-bottom: 1px solid #eee; padding-bottom: 8px; }
        .info-label { font-size: 12px; color: #666; margin-bottom: 2px; }
        .info-value { font-size: 16px; font-weight: bold; }
        
        /* 快速更新行情區塊 */
        .quick-update-box { background: #fff8dc; border: 2px dashed var(--pika-yellow); border-radius: 10px; padding: 12px; margin-top: 15px; }
        .quick-update-row { display: flex; gap: 10px; margin-top: 5px; }
        .quick-update-row input { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; }
        .quick-update-row button { background: var(--pika-brown); color: white; border: none; padding: 8px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; }

        .action-btns { display: flex; gap: 10px; margin-top: 20px; }
        .btn-edit { flex: 1; background: var(--pika-dark); color: var(--pika-yellow); padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-delete { flex: 1; background: #d9534f; color: white; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* 新增/修改表單彈窗 */
        .form-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 300; align-items: center; justify-content: center; }
        .form-box { background: white; width: 90%; max-width: 500px; max-height: 90%; border-radius: 16px; padding: 20px; overflow-y: auto; border: 4px solid var(--pika-dark); }
        .input-item { margin-bottom: 12px; }
        .input-item label { display: block; font-size: 13px; color: #555; margin-bottom: 4px; font-weight: bold; }
        .input-item input, .input-item select, .input-item textarea { width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .img-upload { height: 150px; border: 2px dashed var(--pika-brown); border-radius: 12px; display: flex; align-items: center; justify-content: center; text-align: center; color: var(--pika-brown); font-weight: bold; overflow: hidden; background: #fafafa; cursor: pointer; }

        /* 圖表 */
        .chart-box { height: 220px; margin-top: 20px; background: #fff; border-radius: 12px; padding: 10px; border: 1px solid #ddd; }

        .fab { position: fixed; bottom: 20px; right: 20px; background: var(--pika-yellow); border: 3px solid var(--pika-dark); color: var(--pika-dark); width: 60px; height: 60px; border-radius: 30px; font-size: 32px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 100; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body class="mobile-view"> <div id="loginScreen">
    <div class="login-box">
        <h2 style="margin-top:0; color:var(--pika-dark);">⚡ 系統登入</h2>
        <p style="font-size: 13px; color: #666;">輸入 0000 為手機版<br>輸入 1234 為電腦版</p>
        <input type="password" id="loginPwd" placeholder="請輸入密碼">
        <button onclick="checkLogin()">進入系統</button>
    </div>
</div>

<div class="header">
    <div class="title">
        <span>⚡ 寶可夢圖鑑管理</span>
    </div>
    <div class="search-bar">
        <span>🔍</span>
        <input type="text" id="searchInput" placeholder="搜尋寶可夢名稱或序號..." oninput="renderGrid()">
    </div>
</div>

<div id="cardGrid" class="card-grid"></div>

<button class="fab" onclick="openForm()">＋</button>

<div id="detailModal" class="modal">
    <div class="modal-container">
        <div class="modal-header">
            <span>卡牌詳細資訊</span>
            <button class="close-btn" onclick="closeDetail()">×</button>
        </div>
        <div class="modal-content">
            <img id="detImg" class="detail-img" src="">
            <div class="info-group"><div class="info-label">名稱</div><div class="info-value" id="detName"></div></div>
            <div class="info-group"><div class="info-label">序號</div><div class="info-value" id="detSn"></div></div>
            <div class="info-group"><div class="info-label">認證序號</div><div class="info-value" id="detCert"></div></div>
            <div class="info-group"><div class="info-label">購入管道</div><div class="info-value" id="detSource"></div></div>
            <div class="info-group" style="display:flex; justify-content: space-between;">
                <div><div class="info-label">買進價</div><div class="info-value" id="detBuy"></div></div>
                <div style="text-align:right"><div class="info-label">當前行情</div><div class="info-value" id="detCurrent"></div></div>
            </div>
            <div class="info-group"><div class="info-label">備註</div><div class="info-value" style="font-weight:normal; font-size:14px;" id="detMemo"></div></div>
            
            <div class="quick-update-box">
                <div class="info-label" style="color:var(--pika-brown); font-weight:bold;">💸 獨立更新行情價</div>
                <div class="quick-update-row">
                    <input type="number" id="quickPriceInput" placeholder="輸入最新市場價">
                    <button onclick="submitQuickPrice()">更新</button>
                </div>
            </div>

            <div class="chart-box"><canvas id="priceChart"></canvas></div>

            <div class="action-btns">
                <button class="btn-edit" onclick="editCurrentCard()">✏️ 完整修改</button>
                <button class="btn-delete" onclick="deleteCurrentCard()">🗑️ 刪除</button>
            </div>
        </div>
    </div>
</div>

<div id="formModal" class="form-modal">
    <div class="form-box">
        <h3 id="formTitle" style="margin-top:0; color:var(--pika-dark); border-bottom:2px solid #eee; padding-bottom:10px;">登錄卡牌</h3>
        <div class="input-item">
            <div class="img-upload" onclick="document.getElementById('fileInput').click()">
                <img id="previewImg" style="display:none; width:100%; height:100%; object-fit:contain;">
                <span id="uploadHint">📸 點擊拍照/上傳圖片</span>
            </div>
            <input type="file" id="fileInput" accept="image/*" style="display:none;" onchange="previewFile(this)">
        </div>
        <div class="input-item"><label>序號 (儲存後不可改)</label><input type="text" id="sn" placeholder="如: 001"></div>
        <div class="input-item"><label>寶可夢名稱</label><input type="text" id="name"></div>
        <div class="input-item"><label>認證序號</label><input type="text" id="certId"></div>
        <div class="input-item"><label>購入管道</label><input type="text" id="source"></div>
        <div class="input-item"><label>買進價</label><input type="number" id="buyPrice"></div>
        <div class="input-item"><label>當前行情</label><input type="number" id="currentPrice"></div>
        <div class="input-item"><label>備註</label><textarea id="memo" rows="2"></textarea></div>
        <div class="input-item">
            <label>狀態</label>
            <select id="isSold"><option value="false">持倉中</option><option value="true">已賣出</option></select>
        </div>
        <button onclick="saveData()" style="width:100%; padding:15px; background:var(--pika-brown); color:white; border:none; border-radius:8px; font-size:16px; font-weight:bold; margin-bottom:10px; cursor:pointer;">確認儲存</button>
        <button onclick="closeForm()" style="width:100%; padding:12px; background:#eee; color:#333; border:none; border-radius:8px; font-size:16px; cursor:pointer;">取消</button>
    </div>
</div>

<script>
    // 登入驗證與版面切換邏輯
    function checkLogin() {
        const pwd = document.getElementById('loginPwd').value;
        if (pwd === '0000') {
            document.body.className = 'mobile-view';
            document.getElementById('loginScreen').style.display = 'none';
        } else if (pwd === '1234') {
            document.body.className = 'desktop-view';
            document.getElementById('loginScreen').style.display = 'none';
        } else {
            Swal.fire("錯誤", "密碼不正確！", "error");
        }
    }

    // Firebase 金鑰
    const firebaseConfig = {
      apiKey: "AIzaSyCa_vS9uZ1niPmXQjlmWT1q6h16S_btALU",
      authDomain: "ptcg-1645a.firebaseapp.com",
      projectId: "ptcg-1645a",
      storageBucket: "ptcg-1645a.firebasestorage.app", 
      messagingSenderId: "736309614311",
      appId: "1:736309614311:web:1352e643e04be0a35d7442"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const storage = firebase.storage();
    
    let allCards = [];
    let currentDetailCard = null; 
    let currentChart = null;
    let isEditing = false; 

    function previewFile(input) {
        const file = input.files[0];
        if (file) {
            document.getElementById('previewImg').src = URL.createObjectURL(file);
            document.getElementById('previewImg').style.display = 'block';
            document.getElementById('uploadHint').style.display = 'none';
        }
    }

    function openForm(editData = null) {
        isEditing = !!editData;
        document.getElementById('formModal').style.display = 'flex';
        document.getElementById('formTitle').innerText = isEditing ? "✏️ 修改卡牌資訊" : "➕ 新增卡牌";
        
        document.getElementById('sn').value = editData ? editData.sn : "";
        document.getElementById('sn').disabled = isEditing; 
        document.getElementById('name').value = editData ? editData.name : "";
        document.getElementById('certId').value = editData ? (editData.certId || "") : "";
        document.getElementById('source').value = editData ? (editData.source || "") : "";
        document.getElementById('buyPrice').value = editData ? editData.buyPrice : "";
        document.getElementById('currentPrice').value = editData ? editData.currentPrice : "";
        document.getElementById('memo').value = editData ? (editData.memo || "") : "";
        document.getElementById('isSold').value = editData ? String(editData.isSold) : "false";
        
        const preview = document.getElementById('previewImg');
        const hint = document.getElementById('uploadHint');
        document.getElementById('fileInput').value = ""; 
        if (editData && editData.imageUrl) {
            preview.src = editData.imageUrl;
            preview.style.display = 'block';
            hint.style.display = 'none';
        } else {
            preview.src = "";
            preview.style.display = 'none';
            hint.style.display = 'block';
        }
    }

    function closeForm() { document.getElementById('formModal').style.display = 'none'; }
    function closeDetail() { document.getElementById('detailModal').style.display = 'none'; }

    async function saveData() {
        const sn = document.getElementById('sn').value;
        const name = document.getElementById('name').value;
        const buyPrice = parseFloat(document.getElementById('buyPrice').value) || 0;
        const currentPrice = parseFloat(document.getElementById('currentPrice').value) || 0;
        const file = document.getElementById('fileInput').files[0];

        if (!sn || !name) return Swal.fire("提醒", "序號與名稱不可空白", "warning");

        Swal.fire({ title: '上傳中...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

        try {
            const cardRef = db.collection("cards").doc(sn);
            const docSnap = await cardRef.get();
            let imageUrl = isEditing ? docSnap.data().imageUrl : ""; 
            let history = (docSnap.exists && docSnap.data().history) ? docSnap.data().history : [];

            if (file) {
                const imgRef = storage.ref(`cards/${sn}_${Date.now()}`);
                await imgRef.put(file);
                imageUrl = await imgRef.getDownloadURL();
            }

            if (history.length === 0 || history[history.length-1].price !== currentPrice) {
                history.push({ date: new Date().toLocaleDateString(), price: currentPrice });
            }

            const dataToSave = {
                sn, name, buyPrice, currentPrice, history, imageUrl,
                certId: document.getElementById('certId').value,
                source: document.getElementById('source').value,
                memo: document.getElementById('memo').value,
                isSold: document.getElementById('isSold').value === 'true',
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            };

            await cardRef.set(dataToSave, { merge: true });
            
            if (isEditing && currentDetailCard) {
                currentDetailCard = { ...currentDetailCard, ...dataToSave };
                showDetail(sn); 
            }

            Swal.fire("成功", isEditing ? "修改已儲存" : "新增成功", "success");
            closeForm();
        } catch (e) {
            Swal.fire("失敗", "發生錯誤: " + e.message, "error");
        }
    }

    // 獨立快速更新行情價功能
    async function submitQuickPrice() {
        const newPrice = parseFloat(document.getElementById('quickPriceInput').value);
        if (!newPrice || !currentDetailCard) return Swal.fire("提醒", "請輸入有效的行情價", "warning");

        Swal.fire({ title: '更新中...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

        try {
            const sn = currentDetailCard.sn;
            const cardRef = db.collection("cards").doc(sn);
            
            // 將新價格加入歷史紀錄
            let history = currentDetailCard.history || [];
            history.push({ date: new Date().toLocaleDateString(), price: newPrice });

            await cardRef.update({
                currentPrice: newPrice,
                history: history,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            });

            // 更新畫面資料
            currentDetailCard.currentPrice = newPrice;
            currentDetailCard.history = history;
            
            document.getElementById('quickPriceInput').value = ""; // 清空輸入框
            showDetail(sn); // 重新渲染視窗
            
            Swal.fire("更新成功", `最新時價已更新為 $${newPrice}`, "success");
        } catch (e) {
            Swal.fire("錯誤", "更新失敗: " + e.message, "error");
        }
    }

    async function deleteCurrentCard() {
        if (!currentDetailCard) return;
        const sn = currentDetailCard.sn;
        
        const result = await Swal.fire({
            title: '確定要刪除這張卡牌？',
            text: "刪除後資料將無法恢復！",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#d9534f',
            cancelButtonColor: '#aaa',
            confirmButtonText: '確定刪除'
        });

        if (result.isConfirmed) {
            try {
                Swal.fire({ title: '刪除中...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                await db.collection("cards").doc(sn).delete();
                closeDetail();
                Swal.fire("已刪除", "卡牌已移除", "success");
            } catch (e) {
                Swal.fire("錯誤", "刪除失敗: " + e.message, "error");
            }
        }
    }

    function editCurrentCard() {
        if (currentDetailCard) openForm(currentDetailCard);
    }

    db.collection("cards").orderBy("updatedAt", "desc").onSnapshot(snap => {
        allCards = [];
        snap.forEach(doc => allCards.push(doc.data()));
        renderGrid();
    });

    function renderGrid() {
        const search = document.getElementById('searchInput').value.toLowerCase();
        const grid = document.getElementById('cardGrid');
        grid.innerHTML = "";

        allCards.filter(c => c.name.toLowerCase().includes(search) || c.sn.toLowerCase().includes(search)).forEach(c => {
            const diff = c.currentPrice - c.buyPrice;
            const percent = c.buyPrice ? ((diff / c.buyPrice) * 100).toFixed(1) : 0;
            const colorClass = diff >= 0 ? 'up-text' : 'down-text';
            const sign = diff >= 0 ? '+' : '';

            grid.innerHTML += `
                <div class="grid-item" onclick="showDetail('${c.sn}')">
                    <div class="grid-sn">#${c.sn}</div>
                    ${c.isSold ? '<div class="grid-sold">已售出</div>' : ''}
                    <div class="grid-img-box">
                        <img src="${c.imageUrl || 'https://via.placeholder.com/150?text=NO+IMG'}">
                    </div>
                    <div style="font-weight:bold; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${c.name}</div>
                    <div style="font-size:11px; color:#888; margin-top:2px;">買進: $${c.buyPrice.toLocaleString()}</div>
                    <div class="grid-price-row">
                        <div>時價:</div>
                        <div class="${colorClass}">$${c.currentPrice.toLocaleString()} (${sign}${percent}%)</div>
                    </div>
                </div>
            `;
        });
    }

    function showDetail(sn) {
        const card = allCards.find(c => c.sn === sn) || currentDetailCard;
        if (!card) return;
        currentDetailCard = card;

        document.getElementById('detImg').src = card.imageUrl || 'https://via.placeholder.com/300?text=No+Image';
        document.getElementById('detName').innerText = card.name;
        document.getElementById('detSn').innerText = card.sn;
        document.getElementById('detCert').innerText = card.certId || "無";
        document.getElementById('detSource').innerText = card.source || "未記錄";
        document.getElementById('detMemo').innerText = card.memo || "無";
        document.getElementById('detBuy').innerText = "$" + card.buyPrice.toLocaleString();
        
        const diff = card.currentPrice - card.buyPrice;
        const colorClass = diff >= 0 ? 'up-text' : 'down-text';
        const sign = diff >= 0 ? '+' : '';
        const percent = card.buyPrice ? ((diff / card.buyPrice) * 100).toFixed(1) : 0;
        
        document.getElementById('detCurrent').innerHTML = `<span class="${colorClass}">$${card.currentPrice.toLocaleString()} (${sign}${percent}%)</span>`;
        
        document.getElementById('detailModal').style.display = 'flex';

        // 畫線圖 (線條改為皮卡丘棕色)
        const ctx = document.getElementById('priceChart').getContext('2d');
        if (currentChart) currentChart.destroy();
        currentChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: (card.history||[]).map(h => h.date),
                datasets: [{
                    label: '市場時價',
                    data: (card.history||[]).map(h => h.price),
                    borderColor: 'rgb(160, 78, 6)',
                    backgroundColor: 'rgba(160, 78, 6, 0.1)',
                    fill: true,
                    tension: 0.2
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });
    }
